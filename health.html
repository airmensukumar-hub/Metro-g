<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health & Wealth Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .form-section {
            padding: 40px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
        }

        input, select {
            padding: 12px 15px;
            border: 2px solid #e1e5e9;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #4facfe;
            box-shadow: 0 0 0 3px rgba(79, 172, 254, 0.1);
        }

        .btn {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            padding: 15px 40px;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s ease;
            width: 100%;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .results {
            display: none;
            padding: 40px;
            background: #f8f9ff;
        }

        .score-card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
        }

        .score-circle {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5em;
            font-weight: bold;
            position: relative;
        }

        .health-score {
            background: conic-gradient(#4facfe 0deg, #4facfe 180deg, #ff6b6b 180deg 360deg);
        }

        .wealth-score {
            background: conic-gradient(#43e97b 0deg, #43e97b 180deg, #ff6b6b 180deg 360deg);
        }

        .score-label {
            font-size: 1.5em;
            font-weight: 700;
            margin-bottom: 15px;
            color: #333;
        }

        .score-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .detail-item {
            text-align: center;
            padding: 20px;
            background: #f8f9ff;
            border-radius: 10px;
        }

        .detail-value {
            font-size: 1.8em;
            font-weight: bold;
            color: #4facfe;
        }

        .detail-label {
            color: #666;
            margin-top: 5px;
        }

        @media (max-width: 768px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
            
            .header h1 {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏥💰 Health & Wealth Tracker</h1>
            <p>Enter your details to get your daily scores!</p>
        </div>

        <div class="form-section">
            <form id="healthForm">
                <div class="form-grid">
                    <!-- Health Details -->
                    <div class="form-group">
                        <label>Age</label>
                        <input type="number" id="age" min="1" max="120" required>
                    </div>
                    <div class="form-group">
                        <label>Gender</label>
                        <select id="gender" required>
                            <option value="">Select</option>
                            <option value="male">Male</option>
                            <option value="female">Female</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Height (cm)</label>
                        <input type="number" id="height" min="100" max="250" step="0.1" required>
                    </div>
                    <div class="form-group">
                        <label>Weight (kg)</label>
                        <input type="number" id="weight" min="20" max="300" step="0.1" required>
                    </div>
                    <div class="form-group">
                        <label>Daily Steps</label>
                        <input type="number" id="steps" min="0" placeholder="e.g., 8000">
                    </div>
                    <div class="form-group">
                        <label>Sleep Hours</label>
                        <input type="number" id="sleep" min="0" max="24" step="0.1" placeholder="e.g., 7.5">
                    </div>
                </div>

                <!-- Wealth Details -->
                <div class="form-grid">
                    <div class="form-group">
                        <label>Monthly Income ($)</label>
                        <input type="number" id="income" min="0" placeholder="e.g., 5000">
                    </div>
                    <div class="form-group">
                        <label>Monthly Expenses ($)</label>
                        <input type="number" id="expenses" min="0" placeholder="e.g., 3000">
                    </div>
                    <div class="form-group">
                        <label>Monthly Savings ($)</label>
                        <input type="number" id="savings" min="0" placeholder="e.g., 1000">
                    </div>
                    <div class="form-group">
                        <label>Current Savings ($)</label>
                        <input type="number" id="totalSavings" min="0" placeholder="e.g., 25000">
                    </div>
                    <div class="form-group">
                        <label>Debts ($)</label>
                        <input type="number" id="debts" min="0" placeholder="e.g., 5000">
                    </div>
                </div>

                <button type="submit" class="btn">Calculate My Scores 🚀</button>
            </form>
        </div>

        <div class="results" id="results">
            <div class="score-card">
                <h2 class="score-label">Daily Health Score</h2>
                <div class="score-circle health-score" id="healthCircle">
                    <span id="healthScore">0</span>%
                </div>
            </div>

            <div class="score-card">
                <h2 class="score-label">Daily Wealth Score</h2>
                <div class="score-circle wealth-score" id="wealthCircle">
                    <span id="wealthScore">0</span>%
                </div>
            </div>

            <div class="score-details">
                <div class="detail-item">
                    <div class="detail-value" id="bmiValue">-</div>
                    <div class="detail-label">BMI</div>
                </div>
                <div class="detail-item">
                    <div class="detail-value" id="activityValue">-</div>
                    <div class="detail-label">Activity Level</div>
                </div>
                <div class="detail-item">
                    <div class="detail-value" id="savingsRateValue">-</div>
                    <div class="detail-label">Savings Rate</div>
                </div>
                <div class="detail-item">
                    <div class="detail-value" id="netWorthValue">-</div>
                    <div class="detail-label">Net Worth</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('healthForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Get form data
            const age = parseInt(document.getElementById('age').value);
            const gender = document.getElementById('gender').value;
            const height = parseFloat(document.getElementById('height').value);
            const weight = parseFloat(document.getElementById('weight').value);
            const steps = parseInt(document.getElementById('steps').value) || 0;
            const sleep = parseFloat(document.getElementById('sleep').value) || 0;
            
            const income = parseFloat(document.getElementById('income').value) || 0;
            const expenses = parseFloat(document.getElementById('expenses').value) || 0;
            const savings = parseFloat(document.getElementById('savings').value) || 0;
            const totalSavings = parseFloat(document.getElementById('totalSavings').value) || 0;
            const debts = parseFloat(document.getElementById('debts').value) || 0;

            // Calculate Health Score
            const bmi = weight / Math.pow(height / 100, 2);
            const bmiScore = Math.max(0, 100 - Math.abs(bmi - 22.5) * 8);
            
            const activityScore = Math.min(100, steps / 10000 * 100);
            const sleepScore = Math.min(100, Math.max(0, (sleep - 4) / 8 * 100));
            const ageScore = Math.max(0, 100 - (age - 30) * 2);
            
            const healthScore = Math.round((bmiScore * 0.4 + activityScore * 0.3 + sleepScore * 0.2 + ageScore * 0.1));

            // Calculate Wealth Score
            const savingsRate = income > 0 ? (savings / income) * 100 : 0;
            const debtRatio = income > 0 ? Math.min(100, (debts / income) * 100) : 100;
            const netWorth = totalSavings - debts;
            const wealthScore = Math.round(
                (savingsRate * 0.4 + 
                 Math.max(0, 100 - debtRatio) * 0.3 + 
                 Math.min(100, netWorth / 50000 * 100) * 0.3)
            );

            // Update UI
            document.getElementById('healthScore').textContent = healthScore;
            document.getElementById('wealthScore').textContent = wealthScore;
            document.getElementById('bmiValue').textContent = bmi.toFixed(1);
            document.getElementById('activityValue').textContent = steps.toLocaleString();
            document.getElementById('savingsRateValue').textContent = savingsRate.toFixed(1) + '%';
            document.getElementById('netWorthValue').textContent = netWorth >= 0 ? '$' + netWorth.toLocaleString() : '-$' + Math.abs(netWorth).toLocaleString();

            document.getElementById('results').style.display = 'block';
            document.getElementById('results').scrollIntoView({ behavior: 'smooth' });
        });
    </script>
</body>
</html>
